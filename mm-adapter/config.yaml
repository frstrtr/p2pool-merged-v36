# Merged Mining RPC Adapter Configuration
#
# Run: python3 adapter.py --config config.yaml

# Adapter server settings (P2Pool connects here)
server:
  host: "0.0.0.0"
  port: 44556  # Different port so we don't conflict with direct connection
  # Credentials P2Pool uses to connect to this adapter
  rpc_user: "dogecoinrpc"
  rpc_password: "testpass"

# Upstream daemon (Standard Dogecoin testnet4alpha)
upstream:
  host: "192.168.86.27"
  port: 44555  # Dogecoin testnet4alpha RPC port
  rpc_user: "dogecoinrpc"
  rpc_password: "testpass"
  # Timeout for RPC calls (seconds)
  timeout: 30

# Chain configuration
chain:
  name: "dogecoin_testnet4alpha"
  chain_id: 98

# Coinbase text for OP_RETURN in merged blocks
# This identifies the pool in the blockchain
coinbase_text: "technocore"

# Logging
logging:
  level: "DEBUG"  # Show all activity for testing
  format: "text"  # Human readable for testing
  file: "adapter.log"  # Log file path (null = stdout only, or use --log-file CLI flag)

# Background template poller (adapter polls dogecoind independently)
# P2Pool gets instant responses from cache instead of waiting for daemon
polling:
  interval: 1.0  # seconds between daemon polls (1s = fresh mempool)
